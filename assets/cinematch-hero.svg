<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FF6846"/>
      <stop offset="0.55" stop-color="#FF477E"/>
      <stop offset="1" stop-color="#8B5CF6"/>
    </linearGradient>
    <linearGradient id="headline" x1="272" y1="0" x2="925" y2="0">
      <stop stop-color="#FF7A59"/>
      <stop offset="0.55" stop-color="#AD8CFF"/>
      <stop offset="1" stop-color="#67E8F9"/>
    </linearGradient>
    <radialGradient id="violetGlow" cx="0" cy="0" r="1" gradientTransform="translate(126 82) rotate(42) scale(410 330)">
      <stop stop-color="#8B5CF6" stop-opacity="0.30"/>
      <stop offset="1" stop-color="#8B5CF6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orangeGlow" cx="0" cy="0" r="1" gradientTransform="translate(1080 36) rotate(130) scale(390 320)">
      <stop stop-color="#FF6846" stop-opacity="0.25"/>
      <stop offset="1" stop-color="#FF6846" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#000000" flood-opacity="0.42"/>
    </filter>
    <filter id="buttonShadow" x="-40%" y="-60%" width="180%" height="220%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#FF477E" flood-opacity="0.30"/>
    </filter>
  </defs>

  <rect width="1200" height="630" rx="28" fill="#090A0F"/>
  <rect width="1200" height="630" rx="28" fill="url(#violetGlow)"/>
  <rect width="1200" height="630" rx="28" fill="url(#orangeGlow)"/>

  <g opacity="0.16">
    <circle cx="81" cy="531" r="118" stroke="#FFFFFF"/>
    <circle cx="1141" cy="484" r="164" stroke="#FFFFFF"/>
  </g>

  <g font-family="Inter, Arial, sans-serif">
    <rect x="54" y="41" width="34" height="34" rx="10" fill="url(#brand)"/>
    <text x="71" y="64" text-anchor="middle" fill="#FFFFFF" font-size="17" font-weight="800">C</text>
    <text x="99" y="65" fill="#F7F5F1" font-size="20" font-weight="800" letter-spacing="-0.7">CineMatch</text>

    <circle cx="1000" cy="58" r="4" fill="#42D392"/>
    <circle cx="1000" cy="58" r="9" fill="#42D392" fill-opacity="0.12"/>
    <text x="1014" y="63" fill="#BABAC3" font-size="12" font-weight="600">4,800 movies · live artwork</text>
    <line x1="54" y1="94" x2="1146" y2="94" stroke="#FFFFFF" stroke-opacity="0.09"/>

    <rect x="424" y="128" width="352" height="34" rx="17" fill="#8B5CF6" fill-opacity="0.11" stroke="#B18EFF" stroke-opacity="0.22"/>
    <text x="600" y="150" text-anchor="middle" fill="#D6C7FF" font-size="11" font-weight="700" letter-spacing="1.7">✦ SEARCH EVERY STORY IN THE CATALOGUE</text>

    <text x="600" y="222" text-anchor="middle" fill="#F7F5F1" font-size="54" font-weight="800" letter-spacing="-3.2">Find the movie that</text>
    <text x="600" y="281" text-anchor="middle" fill="url(#headline)" font-size="58" font-weight="800" font-style="italic" letter-spacing="-3.4">fits the mood.</text>
    <text x="600" y="319" text-anchor="middle" fill="#9A9BA7" font-size="15">Search by title, genre, or story — then choose how deep the recommendations go.</text>

    <g filter="url(#shadow)">
      <rect x="155" y="357" width="890" height="202" rx="22" fill="#15161E" fill-opacity="0.92" stroke="#FFFFFF" stroke-opacity="0.10"/>
      <text x="184" y="391" fill="#B8B8C2" font-size="10" font-weight="700" letter-spacing="1.1">SEARCH ALL MOVIES</text>
      <text x="610" y="391" fill="#B8B8C2" font-size="10" font-weight="700" letter-spacing="1.1">CHOOSE FROM MATCHES</text>

      <rect x="181" y="405" width="397" height="52" rx="14" fill="#11121A" stroke="#FFFFFF" stroke-opacity="0.11"/>
      <circle cx="208" cy="431" r="8" stroke="#858691" stroke-width="1.8"/>
      <line x1="214" y1="437" x2="221" y2="444" stroke="#858691" stroke-width="1.8" stroke-linecap="round"/>
      <text x="236" y="437" fill="#D8D8DF" font-size="14">Interstellar</text>

      <rect x="606" y="405" width="410" height="52" rx="14" fill="#11121A" stroke="#AD8CFF" stroke-opacity="0.45"/>
      <text x="629" y="437" fill="#F7F5F1" font-size="14" font-weight="600">Interstellar (2014)</text>
      <text x="975" y="437" text-anchor="end" fill="#A6A6B1" font-size="12">★ 8.1</text>
      <path d="M991 427L997 433L1003 427" stroke="#A6A6B1" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>

      <rect x="181" y="479" width="256" height="50" rx="14" fill="#11121A" stroke="#FFFFFF" stroke-opacity="0.10"/>
      <text x="205" y="510" fill="#D8D8DF" font-size="13">10 recommendations</text>
      <path d="M407 499L413 505L419 499" stroke="#A6A6B1" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>

      <g filter="url(#buttonShadow)">
        <rect x="461" y="479" width="555" height="50" rx="14" fill="url(#brand)"/>
      </g>
      <text x="739" y="510" text-anchor="middle" fill="#FFFFFF" font-size="14" font-weight="800">Find matching movies  →</text>
    </g>

    <text x="600" y="595" text-anchor="middle" fill="#70717D" font-size="11" letter-spacing="1.3">CONTENT-BASED DISCOVERY · NO WATCH HISTORY NEEDED</text>
  </g>
